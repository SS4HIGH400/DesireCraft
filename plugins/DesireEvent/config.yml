# ============================================
# DesireEvent - Конфигурация
# ============================================

# ===== ОСНОВНЫЕ НАСТРОЙКИ =====
max-players: 30
min-players: 1
wait-time-seconds: 60
safe-zone-seconds: 30

# ===== НАСТРОЙКИ ОКОНЧАНИЯ ИВЕНТА =====
# Длительность боя (в секундах) - 30 минут = 1800 секунд
fight-duration-seconds: 1800

# При каком количестве оставшихся игроков завершать ивент
# Если останется меньше или равно этому числу - ивент заканчивается
end-when-players-left: 3

# Включить автоматическое завершение при достижении лимита игроков
enable-end-by-players-count: true

# Включить автоматическое завершение по таймеру (30 минут)
enable-end-by-timer: true

# ===== НАСТРОЙКИ ПОВТОРНОГО ВХОДА =====
# Запрещать ли вход в ивент после смерти
prevent-rejoin-after-death: true

# ===== АВТОЗАПУСК ПО РАСПИСАНИЮ =====
auto-start-times:
  - "14:00"
  - "20:00"

# ===== НАГРАДЫ ЗА МЕСТА =====
rewards:
  first-place:
    type: "money"
    value: 5000
    message: "&6&lПОБЕДИТЕЛЬ! &fВы получили &e%reward% монет!"
  second-place:
    type: "money"
    value: 2500
    message: "&e2-е место! &fВы получили &e%reward% монет!"
  third-place:
    type: "money"
    value: 1000
    message: "&e3-е место! &fВы получили &e%reward% монет!"
  participation:
    type: "money"
    value: 100
    message: "&aУчастие! &fВы получили &e%reward% монет!"

# ===== МИР ДЛЯ ИВЕНТА =====
event-world: "WarZone"

# ===== КООРДИНАТЫ БЕЗОПАСНОЙ ЗОНЫ =====
safe-zone:
  x: 278
  y: 93
  z: 1453
  yaw: 0
  pitch: 0

# ===== КООРДИНАТЫ АРЕНЫ =====
arena-spawn:
  x: 331
  y: 96
  z: 1453
  yaw: 0
  pitch: 0

# ===== КУДА ТЕЛЕПОРТИРОВАТЬ ПОСЛЕ ИВЕНТА =====
teleport-after-event:
  type: "command"
  value: "spawn"

# ===== НАБОР ПРЕДМЕТОВ (КИТ) =====
kit-items:
  - "DIAMOND_SWORD:1"
  - "DIAMOND_CHESTPLATE:1"
  - "DIAMOND_LEGGINGS:1"
  - "DIAMOND_BOOTS:1"
  - "GOLDEN_APPLE:16"
  - "COOKED_BEEF:32"

# ===== ИНФОРМАЦИЯ ОБ ИВЕНТЕ =====
event-info:
  title: "&6&l=== DESIRE PVP ИВЕНТ ==="
  description:
    - "&7┌─────────────────────────────┐"
    - "&e⚔ &fОписание: &7Битва на выживание на специальной арене"
    - "&e⚔ &fУчастники: &7Последний выживший побеждает"
    - "&e⚔ &fРежим: &7Без правил, разрешено всё"
    - "&7├─────────────────────────────┤"
    - "&e🏆 &fНаграды:"
    - "&6  ➤ 1 место: &e%first% монет"
    - "&6  ➤ 2 место: &e%second% монет"
    - "&6  ➤ 3 место: &e%third% монет"
    - "&6  ➤ Участникам: &e%part% монет"
    - "&7├─────────────────────────────┤"
    - "&a📋 &fКак участвовать:"
    - "&7  ➤ Дождитесь объявления о начале ивента"
    - "&7  ➤ Введите &e/event go &7для участия"
    - "&7  ➤ После смерти вы не сможете вернуться"
    - "&7  ➤ Ивент заканчивается когда останется &e%end-count% &7игроков или через 30 минут"
    - "&7└─────────────────────────────┘"

